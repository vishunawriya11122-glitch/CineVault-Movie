services:
  mongodb:
    image: mongo:7
    container_name: cinevault-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: cinevault
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-cinevault_secret}
      MONGO_INITDB_DATABASE: cinevault
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: cinevault-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cinevault-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - mongodb
      - redis
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://cinevault:${MONGO_PASSWORD:-cinevault_secret}@mongodb:27017/cinevault?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh}
      S3_BUCKET: ${S3_BUCKET:-cinevault}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      TMDB_ACCESS_TOKEN: ${TMDB_ACCESS_TOKEN}

volumes:
  mongo_data:
  redis_data:
