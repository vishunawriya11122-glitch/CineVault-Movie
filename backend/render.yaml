services:
  - type: web
    name: CineVault-Movie
    runtime: node
    rootDir: backend
    buildCommand: npm install --ignore-scripts --no-audit --no-fund && npm run build
    startCommand: node dist/main
    region: oregon
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=400"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ADMIN_JWT_SECRET
        sync: false
    healthCheckPath: /api/v1/health
    autoDeploy: true
