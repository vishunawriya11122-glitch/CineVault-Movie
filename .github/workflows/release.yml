name: Build & Release APK

on:
  push:
    tags:
      - 'v*'           # Triggers on v1.0.0, v1.2.3, etc.
  workflow_dispatch:   # Allow manual trigger from GitHub UI
    inputs:
      version:
        description: 'Version number (e.g. 1.2.3)'
        required: true
        default: '1.0.0'

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Update version in build.gradle.kts
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BUILD_NUM="${{ github.run_number }}"
          sed -i "s/versionName = \".*\"/versionName = \"$VERSION\"/" android/app/build.gradle.kts
          sed -i "s/versionCode = [0-9]*/versionCode = $BUILD_NUM/" android/app/build.gradle.kts

      # --- Signed release build (requires keystore secrets) ---
      - name: Decode keystore (if available)
        if: secrets.KEYSTORE_BASE64 != ''
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
        continue-on-error: true

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/android/app/keystore.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/VELORA-v${VERSION}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', steps.version.outputs.VERSION) || github.ref_name }}
          name: "VELORA v${{ steps.version.outputs.VERSION }}"
          body: |
            ## VELORA v${{ steps.version.outputs.VERSION }}

            Download the APK below and install on your Android device.
            Enable **"Install from unknown sources"** in settings if prompted.

            **Minimum Android:** 7.0 (API 24)
          files: android/app/build/outputs/apk/release/VELORA-v${{ steps.version.outputs.VERSION }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
